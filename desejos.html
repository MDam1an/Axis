<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Axis — Desejos</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .tabs { display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px; }
    .tbtn { padding:5px 14px;border-radius:20px;font-size:.8125rem;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .15s; }
    .tbtn.on { background:var(--text);color:#fff;border-color:var(--text); }
    .desejos-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px; }
    .d-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:box-shadow .2s; }
    .d-card:hover { box-shadow:var(--shadow-md); }
    .d-card.feito { opacity:.55; }
    .d-card.feito .d-name { text-decoration:line-through; }
    .d-icon { font-size:1.75rem;margin-bottom:9px; }
    .d-name { font-size:.9375rem;font-weight:600;margin-bottom:4px; }
    .d-note { font-size:.8rem;color:var(--text-2);margin-bottom:10px; }
    .d-footer { display:flex;align-items:center;justify-content:space-between; }
    .btn-done { font-size:.8125rem;font-weight:500;padding:5px 11px;border-radius:6px;cursor:pointer;border:none;background:var(--surface-2);color:var(--text-2);transition:all .15s; }
    .btn-done:hover,.btn-done.feito { background:var(--success-light);color:var(--success); }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebarMount"></div>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburgerBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title" id="topbarTitle">Desejos</span>
      </div>
      <span class="topbar-date" id="topbarDate"></span>
    </header>
    <div class="page-content">
      <div class="page-top">
        <div><h1>Lista de Desejos</h1><p>Filmes, lugares, compras, experiências...</p></div>
        <button class="btn btn-primary" id="btnAdd">+ Adicionar</button>
      </div>
      <div class="tabs">
        <button class="tbtn on" data-c="todos">Todos</button>
        <button class="tbtn" data-c="filme">🎬 Filmes</button>
        <button class="tbtn" data-c="lugar">📍 Lugares</button>
        <button class="tbtn" data-c="compra">🛍️ Compras</button>
        <button class="tbtn" data-c="livro">📚 Livros</button>
        <button class="tbtn" data-c="experiencia">✨ Experiências</button>
        <button class="tbtn" data-c="outro">Outro</button>
      </div>
      <div class="desejos-grid" id="grid">
        <div class="empty" style="grid-column:1/-1"><div class="empty-icon">💫</div><p>Nenhum desejo. Adicione o que quer fazer, ver ou comprar!</p></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">Novo desejo</h2><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="fName" placeholder="O que quer fazer/ver/comprar?"></div>
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-select" id="fCat">
          <option value="filme">🎬 Filme/Série</option><option value="lugar">📍 Lugar</option>
          <option value="compra">🛍️ Compra</option><option value="livro">📚 Livro</option>
          <option value="experiencia">✨ Experiência</option><option value="outro">💫 Outro</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Observação (opcional)</label><textarea class="form-textarea" id="fNote" placeholder="Com quem, motivo..."></textarea></div>
      <button class="btn btn-primary btn-full" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initShell } from './js/shell.js';
  import { db } from './js/firebase-config.js';
  import { toast, openModal, closeModal, setupModals } from './js/utils.js';
  import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  setupModals();
  let uid = '', cat = 'todos';
  const icons = {filme:'🎬',lugar:'📍',compra:'🛍️',livro:'📚',experiencia:'✨',outro:'💫'};

  initShell('Desejos', async (user) => { uid = user.uid; await load(); });

  document.querySelectorAll('.tbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on'); cat = btn.dataset.c; load();
    });
  });

  async function load() {
    const grid = document.getElementById('grid');
    const snap = await getDocs(collection(db, `users/${uid}/desejos`));
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    if (cat !== 'todos') items = items.filter(x => x.category === cat);
    if (!items.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">💫</div><p>Nenhum item aqui ainda.</p></div>'; return; }
    grid.innerHTML = '';
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = `d-card ${item.done?'feito':''}`;
      card.innerHTML = `
        <div class="d-icon">${icons[item.category]||'💫'}</div>
        <div class="d-name">${item.name}</div>
        ${item.note?`<div class="d-note">${item.note}</div>`:''}
        ${item.done?`<div style="font-size:.72rem;color:var(--success);margin-bottom:8px">✓ Concluído</div>`:''}
        <div class="d-footer">
          <button class="btn-done ${item.done?'feito':''}">${item.done?'↩ Desfazer':'✓ Feito!'}</button>
          <div style="display:flex;gap:3px">
            <button class="btn btn-ghost btn-icon" data-act="edit">✏️</button>
            <button class="btn btn-ghost btn-icon" data-act="del">🗑️</button>
          </div>
        </div>`;
      grid.appendChild(card);

      card.querySelector('.btn-done').addEventListener('click', async () => {
        await updateDoc(doc(db, `users/${uid}/desejos`, item.id), { done: !item.done });
        if (!item.done) toast(`"${item.name}" marcado como feito! 🎉`, 'success');
        load();
      });
      card.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('Remover este item?')) return;
        await deleteDoc(doc(db, `users/${uid}/desejos`, item.id));
        toast('Item removido.'); load();
      });
      card.querySelector('[data-act="edit"]').addEventListener('click', () => {
        document.getElementById('editId').value = item.id;
        document.getElementById('fName').value = item.name;
        document.getElementById('fCat').value = item.category;
        document.getElementById('fNote').value = item.note||'';
        document.getElementById('modalTitle').textContent = 'Editar desejo';
        openModal('modal');
      });
    });
  }

  document.getElementById('btnAdd').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('modalTitle').textContent = 'Novo desejo';
    openModal('modal');
  });

  document.getElementById('btnSave').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return toast('Informe o nome.', 'error');
    const data = { name, category: document.getElementById('fCat').value, note: document.getElementById('fNote').value.trim(), updatedAt: serverTimestamp() };
    const editId = document.getElementById('editId').value;
    if (editId) {
      await updateDoc(doc(db, `users/${uid}/desejos`, editId), data);
      toast('Item atualizado!', 'success');
    } else {
      data.done = false; data.createdAt = serverTimestamp();
      await addDoc(collection(db, `users/${uid}/desejos`), data);
      toast('Adicionado! 💫', 'success');
    }
    closeModal('modal'); load();
  });
</script>
</body>
</html>
