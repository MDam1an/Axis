<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Axis — Vícios</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .vicios-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .vicio-head { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px; }
    .vicio-head-left { display:flex;align-items:center;gap:10px; }
    .vicio-emoji { font-size:2rem; }
    .vicio-name { font-size:.9375rem;font-weight:600; }
    .vicio-cat { font-size:.78rem;color:var(--text-2); }
    .vicio-actions { display:flex;gap:3px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebarMount"></div>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburgerBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title" id="topbarTitle">Vícios</span>
      </div>
      <span class="topbar-date" id="topbarDate"></span>
    </header>
    <div class="page-content">
      <div class="page-top">
        <div><h1>Vícios & Restrições</h1><p>Acompanhe seus dias sem recaída</p></div>
        <button class="btn btn-primary" id="btnAdd">+ Adicionar vício</button>
      </div>
      <div class="vicios-grid" id="viciosGrid">
        <div class="empty" style="grid-column:1/-1"><div class="empty-icon">🛡️</div><p>Nenhum vício cadastrado ainda.</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">Novo vício</h2><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label class="form-label">Nome do vício</label><input class="form-input" id="fName" placeholder="Ex: Açúcar, Cigarro..."></div>
      <div class="form-group"><label class="form-label">Emoji</label><input class="form-input" id="fEmoji" placeholder="🚫" maxlength="2"></div>
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-select" id="fCat">
          <option value="alimentação">Alimentação</option><option value="comportamento">Comportamento</option>
          <option value="tecnologia">Tecnologia</option><option value="substância">Substância</option><option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Dificuldade</label>
        <select class="form-select" id="fDiff"><option value="leve">Leve</option><option value="moderado">Moderado</option><option value="severo">Severo</option></select>
      </div>
      <div class="form-group"><label class="form-label">Data que parou</label><input type="date" class="form-input" id="fDate"></div>
      <div class="form-group"><label class="form-label">Motivação (opcional)</label><textarea class="form-textarea" id="fMotiv" placeholder="Por que quer parar?"></textarea></div>
      <button class="btn btn-primary btn-full" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initShell } from './js/shell.js';
  import { db } from './js/firebase-config.js';
  import { today, daysBetween, toast, openModal, closeModal, setupModals } from './js/utils.js';
  import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  setupModals();
  let uid = '';

  initShell('Vícios', async (user) => {
    uid = user.uid;
    await load();
  });

  async function load() {
    const grid = document.getElementById('viciosGrid');
    const snap = await getDocs(collection(db, `users/${uid}/vicios`));
    if (snap.empty) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🛡️</div><p>Nenhum vício cadastrado ainda.</p></div>'; return; }
    grid.innerHTML = '';
    const t = today();
    snap.forEach(d => {
      const v = d.data();
      const days = daysBetween(v.startDate || t, t);
      const dc = {leve:'db-leve',moderado:'db-moderado',severo:'db-severo'}[v.difficulty] || 'db-leve';
      const card = document.createElement('div');
      card.className = 'vicio-card';
      card.innerHTML = `
        <div class="vicio-head">
          <div class="vicio-head-left">
            <div class="vicio-emoji">${v.emoji||'🚫'}</div>
            <div>
              <div class="vicio-name">${v.name}</div>
              <div class="vicio-cat">${v.category||'outro'}</div>
              <span class="diff-badge ${dc}">${v.difficulty||'leve'}</span>
            </div>
          </div>
          <div class="vicio-actions">
            <button class="btn btn-ghost btn-icon" data-act="edit">✏️</button>
            <button class="btn btn-ghost btn-icon" data-act="del">🗑️</button>
          </div>
        </div>
        <div class="streak-box">
          <div class="streak-num ${days===0?'zero':''}">${days}</div>
          <div class="streak-sub">${days===1?'dia sem recaída':'dias sem recaída'}</div>
        </div>
        ${v.motivation ? `<div style="font-size:.85rem;color:var(--text-2);font-style:italic;margin-bottom:10px">"${v.motivation}"</div>` : ''}
        <button class="btn-recaida">😔 Tive uma recaída</button>
        ${(v.relapses?.length||0)>0 ? `<div style="font-size:.78rem;color:var(--text-3);margin-top:7px">Recaídas: ${v.relapses.length}</div>` : ''}`;
      grid.appendChild(card);

      card.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('Remover este vício?')) return;
        await deleteDoc(doc(db, `users/${uid}/vicios`, d.id));
        toast('Vício removido.'); load();
      });

      card.querySelector('[data-act="edit"]').addEventListener('click', () => {
        document.getElementById('editId').value = d.id;
        document.getElementById('fName').value = v.name;
        document.getElementById('fEmoji').value = v.emoji || '';
        document.getElementById('fCat').value = v.category || 'outro';
        document.getElementById('fDiff').value = v.difficulty || 'leve';
        document.getElementById('fDate').value = v.startDate || today();
        document.getElementById('fMotiv').value = v.motivation || '';
        document.getElementById('modalTitle').textContent = 'Editar vício';
        openModal('modal');
      });

      card.querySelector('.btn-recaida').addEventListener('click', async () => {
        if (!confirm(`Registrar recaída em "${v.name}"? O contador será resetado.`)) return;
        const relapses = [...(v.relapses||[]), today()];
        await updateDoc(doc(db, `users/${uid}/vicios`, d.id), { startDate: today(), relapses });
        toast('Recaída registrada. Você consegue 💪'); load();
      });
    });
  }

  document.getElementById('btnAdd').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fEmoji').value = '';
    document.getElementById('fDate').value = today();
    document.getElementById('fMotiv').value = '';
    document.getElementById('modalTitle').textContent = 'Novo vício';
    openModal('modal');
  });

  document.getElementById('btnSave').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return toast('Informe o nome do vício.', 'error');
    const data = {
      name, emoji: document.getElementById('fEmoji').value || '🚫',
      category: document.getElementById('fCat').value,
      difficulty: document.getElementById('fDiff').value,
      startDate: document.getElementById('fDate').value || today(),
      motivation: document.getElementById('fMotiv').value.trim(),
      updatedAt: serverTimestamp()
    };
    const editId = document.getElementById('editId').value;
    if (editId) {
      await updateDoc(doc(db, `users/${uid}/vicios`, editId), data);
      toast('Vício atualizado!', 'success');
    } else {
      data.relapses = []; data.createdAt = serverTimestamp();
      await addDoc(collection(db, `users/${uid}/vicios`), data);
      toast('Vício adicionado! Você consegue 💪', 'success');
    }
    closeModal('modal'); load();
  });
</script>
</body>
</html>
