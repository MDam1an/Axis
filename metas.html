<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axis — Metas</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 0.875rem;
      font-weight: 500; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-2); cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn.active {
      background: var(--text); color: #fff; border-color: var(--text);
    }

    .metas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    .meta-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      box-shadow: var(--shadow); transition: box-shadow var(--transition);
    }
    .meta-card:hover { box-shadow: var(--shadow-md); }
    .meta-card.concluida { opacity: 0.6; }

    .meta-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .meta-card-name { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .meta-card-desc { font-size: 0.875rem; color: var(--text-2); }

    .meta-progress-row { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
    .meta-pct-label { font-family: 'DM Serif Display', serif; font-size: 1.5rem; min-width: 52px; }

    .meta-range {
      width: 100%; cursor: pointer; accent-color: var(--accent);
    }

    .meta-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }

    .prazo-label { font-size: 0.8125rem; color: var(--text-2); }
    .prazo-label.vencida { color: var(--danger); }

    .status-select {
      font-size: 0.8125rem; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px;
      background: var(--surface); color: var(--text-2); cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebarMount"></div>
  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Metas</span>
      <span class="topbar-date" id="topbarDate"></span>
    </header>
    <div class="page-content">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
          <h1>Metas & Objetivos</h1>
          <p>Acompanhe seu progresso em direção aos seus sonhos</p>
        </div>
        <button class="btn btn-primary" id="addMetaBtn">+ Nova meta</button>
      </div>

      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="andamento">Em andamento</button>
        <button class="filter-btn" data-filter="concluida">Concluídas</button>
        <button class="filter-btn" data-filter="pausada">Pausadas</button>
      </div>

      <div class="metas-grid stagger" id="metasGrid">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🎯</div>
          <p>Nenhuma meta cadastrada ainda.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalMeta">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalMetaTitle">Nova meta</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editMetaId">
      <div class="form-group">
        <label class="form-label">Nome da meta</label>
        <input type="text" class="form-input" id="metaName" placeholder="Ex: Aprender inglês, Economizar R$5000...">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição (opcional)</label>
        <textarea class="form-textarea" id="metaDesc" placeholder="Detalhes da sua meta..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="metaCat">
          <option value="Saúde">Saúde</option>
          <option value="Finanças">Finanças</option>
          <option value="Educação">Educação</option>
          <option value="Carreira">Carreira</option>
          <option value="Pessoal">Pessoal</option>
          <option value="Relacionamento">Relacionamento</option>
          <option value="Viagem">Viagem</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Prazo</label>
        <input type="date" class="form-input" id="metaPrazo">
      </div>
      <div class="form-group">
        <label class="form-label">Progresso inicial: <span id="progLabel">0%</span></label>
        <input type="range" class="meta-range" id="metaProgress" min="0" max="100" value="0">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" id="saveMetaBtn">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, getCurrentUser } from './js/auth.js';
  import { renderSidebar, setActivePage } from './js/sidebar.js';
  import { setTopbarDate, today, toast, openModal, closeModal, bindModalClose } from './js/utils.js';
  import { db } from './js/firebase-config.js';
  import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  document.getElementById('sidebarMount').innerHTML = renderSidebar();
  setActivePage(); setTopbarDate(); requireAuth(); bindModalClose();

  const user = await getCurrentUser();
  if (!user) return;
  const uid = user.uid;
  const col = () => collection(db, `users/${uid}/metas`);
  let activeFilter = 'todas';

  document.getElementById('metaProgress').addEventListener('input', function() {
    document.getElementById('progLabel').textContent = this.value + '%';
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      loadMetas();
    });
  });

  async function loadMetas() {
    const grid = document.getElementById('metasGrid');
    grid.innerHTML = '';
    const snap = await getDocs(col());

    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    if (activeFilter !== 'todas') items = items.filter(m => m.status === activeFilter);

    if (items.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🎯</div><p>Nenhuma meta aqui ainda.</p></div>`;
      return;
    }

    items.forEach(m => {
      const pct = Math.min(100, Math.round(m.progress || 0));
      const isVencida = m.deadline && m.deadline < today() && m.status !== 'concluida';
      const prazoText = m.deadline
        ? `Prazo: ${new Date(m.deadline + 'T00:00:00').toLocaleDateString('pt-BR')}`
        : 'Sem prazo';
      const card = document.createElement('div');
      card.className = `meta-card fade-in ${m.status === 'concluida' ? 'concluida' : ''}`;
      card.innerHTML = `
        <div class="meta-card-header">
          <div style="flex:1">
            <div class="meta-card-name">${m.name}</div>
            ${m.description ? `<div class="meta-card-desc">${m.description}</div>` : ''}
            <span class="badge badge-neutral" style="margin-top:6px;">${m.category || 'Geral'}</span>
          </div>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-ghost btn-icon edit-m" data-id="${m.id}" title="Editar">✏️</button>
            <button class="btn btn-ghost btn-icon del-m" data-id="${m.id}" title="Excluir">🗑️</button>
          </div>
        </div>
        <div class="meta-progress-row">
          <div class="meta-pct-label" id="pct-${m.id}">${pct}%</div>
          <input type="range" class="meta-range" min="0" max="100" value="${pct}" data-id="${m.id}">
        </div>
        <div class="progress-bar"><div class="progress-fill ${pct >= 100 ? 'success' : ''}" style="width:${pct}%"></div></div>
        <div class="meta-card-footer">
          <span class="prazo-label ${isVencida ? 'vencida' : ''}">${isVencida ? '⚠️ ' : ''}${prazoText}</span>
          <select class="status-select" data-id="${m.id}">
            <option value="andamento" ${m.status==='andamento'?'selected':''}>Em andamento</option>
            <option value="pausada" ${m.status==='pausada'?'selected':''}>Pausada</option>
            <option value="concluida" ${m.status==='concluida'?'selected':''}>Concluída ✓</option>
          </select>
        </div>`;
      grid.appendChild(card);

      // Range slider
      card.querySelector('.meta-range').addEventListener('change', async (e) => {
        const val = parseInt(e.target.value);
        document.getElementById(`pct-${m.id}`).textContent = val + '%';
        card.querySelector('.progress-fill').style.width = val + '%';
        await updateDoc(doc(db, `users/${uid}/metas`, m.id), { progress: val });
        if (val === 100) toast('Meta concluída! 🎉', 'success');
      });

      // Status
      card.querySelector('.status-select').addEventListener('change', async (e) => {
        await updateDoc(doc(db, `users/${uid}/metas`, m.id), { status: e.target.value });
        toast('Status atualizado!', 'success');
        loadMetas();
      });

      card.querySelector('.del-m').addEventListener('click', async () => {
        if (!confirm('Remover esta meta?')) return;
        await deleteDoc(doc(db, `users/${uid}/metas`, m.id));
        toast('Meta removida.'); loadMetas();
      });

      card.querySelector('.edit-m').addEventListener('click', () => {
        document.getElementById('editMetaId').value = m.id;
        document.getElementById('metaName').value = m.name;
        document.getElementById('metaDesc').value = m.description || '';
        document.getElementById('metaCat').value = m.category || 'Outro';
        document.getElementById('metaPrazo').value = m.deadline || '';
        document.getElementById('metaProgress').value = m.progress || 0;
        document.getElementById('progLabel').textContent = (m.progress || 0) + '%';
        document.getElementById('modalMetaTitle').textContent = 'Editar meta';
        openModal('modalMeta');
      });
    });
  }

  loadMetas();

  document.getElementById('addMetaBtn').addEventListener('click', () => {
    document.getElementById('editMetaId').value = '';
    document.getElementById('metaName').value = '';
    document.getElementById('metaDesc').value = '';
    document.getElementById('metaPrazo').value = '';
    document.getElementById('metaProgress').value = 0;
    document.getElementById('progLabel').textContent = '0%';
    document.getElementById('modalMetaTitle').textContent = 'Nova meta';
    openModal('modalMeta');
  });

  document.getElementById('saveMetaBtn').addEventListener('click', async () => {
    const name = document.getElementById('metaName').value.trim();
    if (!name) return toast('Informe o nome da meta.', 'error');
    const data = {
      name,
      description: document.getElementById('metaDesc').value.trim(),
      category: document.getElementById('metaCat').value,
      deadline: document.getElementById('metaPrazo').value || null,
      progress: parseInt(document.getElementById('metaProgress').value),
      updatedAt: serverTimestamp()
    };
    const editId = document.getElementById('editMetaId').value;
    if (editId) {
      await updateDoc(doc(db, `users/${uid}/metas`, editId), data);
      toast('Meta atualizada!', 'success');
    } else {
      data.status = 'andamento';
      data.createdAt = serverTimestamp();
      await addDoc(col(), data);
      toast('Meta criada! Vai lá 🎯', 'success');
    }
    closeModal('modalMeta'); loadMetas();
  });

  document.getElementById('logoutBtn')?.addEventListener('click', async () => {
    const { logout } = await import('./js/auth.js'); logout();
  });
</script>
</body>
</html>
