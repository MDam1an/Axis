<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Axis — Hábitos</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .hab-layout { display:grid; grid-template-columns:1fr 320px; gap:18px; }
    @media(max-width:900px){ .hab-layout{grid-template-columns:1fr;} }
    .prog-row { display:flex;align-items:center;gap:10px;margin-bottom:16px; }
    .prog-frac { font-family:'DM Serif Display',serif;font-size:1.25rem;min-width:40px; }
    .hab-actions { margin-left:auto;display:flex;gap:3px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebarMount"></div>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburgerBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title" id="topbarTitle">Hábitos</span>
      </div>
      <span class="topbar-date" id="topbarDate"></span>
    </header>
    <div class="page-content">
      <div class="page-top">
        <div><h1>Hábitos diários</h1><p>Marque os concluídos hoje</p></div>
        <button class="btn btn-primary" id="btnAdd">+ Novo hábito</button>
      </div>
      <div class="hab-layout">
        <div>
          <div class="card" style="margin-bottom:14px">
            <div class="card-title">Progresso de hoje</div>
            <div class="prog-row">
              <span class="prog-frac" id="habFrac">0/0</span>
              <div style="flex:1"><div class="progress-bar" style="height:8px"><div class="progress-fill pf-green" id="habBar" style="width:0%"></div></div></div>
              <span id="habPct" style="font-size:.875rem;color:var(--text-2)">0%</span>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Seus hábitos</div>
            <div id="habList"><div class="empty"><div class="empty-icon">✅</div><p>Nenhum hábito. Adicione o primeiro!</p></div></div>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="card-title">Consistência — últimas 4 semanas</div>
            <div id="consName" style="font-size:.8rem;color:var(--text-2);margin-bottom:7px">Clique em 📊 para ver</div>
            <div class="cons-grid" id="consGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">Novo hábito</h2><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label class="form-label">Nome do hábito</label><input class="form-input" id="fName" placeholder="Ex: Beber 2L de água..."></div>
      <div class="form-group"><label class="form-label">Emoji</label><input class="form-input" id="fEmoji" placeholder="💧" maxlength="2"></div>
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-select" id="fCat">
          <option value="saude">Saúde</option><option value="estudo">Estudo</option>
          <option value="social">Social</option><option value="financas">Finanças</option><option value="outro">Outro</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initShell } from './js/shell.js';
  import { db } from './js/firebase-config.js';
  import { today, toast, openModal, closeModal, setupModals } from './js/utils.js';
  import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  setupModals();
  let uid = '';
  const catPills = {saude:'cp-saude',estudo:'cp-estudo',social:'cp-social',financas:'cp-financas',outro:'cp-outro'};

  initShell('Hábitos', async (user) => { uid = user.uid; await load(); });

  async function load() {
    const t = today();
    const snap = await getDocs(collection(db, `users/${uid}/habitos`));
    const list = document.getElementById('habList');
    if (snap.empty) { list.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><p>Nenhum hábito. Adicione o primeiro!</p></div>'; updateProg(0,0); return; }
    let done = 0, total = 0;
    list.innerHTML = '';
    snap.forEach(d => {
      const h = d.data();
      const isDone = (h.completedDates||[]).includes(t);
      if (isDone) done++;
      total++;
      const row = document.createElement('div');
      row.className = 'habito-row';
      row.innerHTML = `
        <div class="check ${isDone?'on':''}">${isDone?'✓':''}</div>
        <div class="habito-icon">${h.emoji||'✅'}</div>
        <div style="flex:1">
          <div style="font-size:.9375rem;font-weight:500;${isDone?'text-decoration:line-through;color:var(--text-3)':''}">${h.name}</div>
          <span class="cat-pill ${catPills[h.category]||'cp-outro'}">${h.category||'outro'}</span>
        </div>
        <div class="hab-actions">
          <button class="btn btn-ghost btn-icon" data-act="cons" title="Consistência" data-dates='${JSON.stringify(h.completedDates||[])}' data-name="${h.name}">📊</button>
          <button class="btn btn-ghost btn-icon" data-act="edit">✏️</button>
          <button class="btn btn-ghost btn-icon" data-act="del">🗑️</button>
        </div>`;
      list.appendChild(row);

      // Toggle check — só no checkbox
      row.querySelector('.check').addEventListener('click', async () => {
        const ref = doc(db, `users/${uid}/habitos`, d.id);
        if (isDone) {
          await updateDoc(ref, { completedDates: arrayRemove(t) });
        } else {
          await updateDoc(ref, { completedDates: arrayUnion(t) });
          toast(`"${h.name}" concluído hoje! 🎉`, 'success');
        }
        load();
      });

      row.querySelector('[data-act="cons"]').addEventListener('click', e => {
        const btn = e.currentTarget;
        document.getElementById('consName').textContent = btn.dataset.name;
        renderCons(JSON.parse(btn.dataset.dates||'[]'));
      });
      row.querySelector('[data-act="edit"]').addEventListener('click', () => {
        document.getElementById('editId').value = d.id;
        document.getElementById('fName').value = h.name;
        document.getElementById('fEmoji').value = h.emoji || '';
        document.getElementById('fCat').value = h.category || 'outro';
        document.getElementById('modalTitle').textContent = 'Editar hábito';
        openModal('modal');
      });
      row.querySelector('[data-act="del"]').addEventListener('click', async () => {
        if (!confirm('Remover este hábito?')) return;
        await deleteDoc(doc(db, `users/${uid}/habitos`, d.id));
        toast('Hábito removido.'); load();
      });
    });
    updateProg(done, total);
  }

  function updateProg(done, total) {
    const pct = total ? Math.round(done/total*100) : 0;
    document.getElementById('habFrac').textContent = `${done}/${total}`;
    document.getElementById('habBar').style.width = pct + '%';
    document.getElementById('habPct').textContent = pct + '%';
  }

  function renderCons(dates) {
    const grid = document.getElementById('consGrid');
    grid.innerHTML = '';
    const now = new Date();
    for (let i = 27; i >= 0; i--) {
      const d = new Date(now); d.setDate(now.getDate() - i);
      const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const el = document.createElement('div');
      el.className = `c-dot ${dates.includes(s)?'on':''}`;
      el.title = s;
      grid.appendChild(el);
    }
  }

  document.getElementById('btnAdd').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fEmoji').value = '';
    document.getElementById('modalTitle').textContent = 'Novo hábito';
    openModal('modal');
  });

  document.getElementById('btnSave').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) return toast('Informe o nome do hábito.', 'error');
    const data = { name, emoji: document.getElementById('fEmoji').value || '✅', category: document.getElementById('fCat').value, updatedAt: serverTimestamp() };
    const editId = document.getElementById('editId').value;
    if (editId) {
      await updateDoc(doc(db, `users/${uid}/habitos`, editId), data);
      toast('Hábito atualizado!', 'success');
    } else {
      data.completedDates = []; data.createdAt = serverTimestamp();
      await addDoc(collection(db, `users/${uid}/habitos`), data);
      toast('Hábito criado!', 'success');
    }
    closeModal('modal'); load();
  });
</script>
</body>
</html>
